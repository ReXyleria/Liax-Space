services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-liax_space}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-rexyleria/liax-space:test}
    pull_policy: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME:-liax_space}
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root}
      STORAGE_UPLOADS_DIR: /app/storage/uploads
      STORAGE_RENDERED_DIR: /app/storage/rendered
      STORAGE_RUNTIME_DIR: /app/storage/runtime
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      BACKGROUND_WORKER_MODE: external
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/app/storage/uploads
      - rendered:/app/storage/rendered
      - runtime:/app/storage/runtime
      - backups:/app/storage/backups

  worker:
    image: ${APP_IMAGE:-rexyleria/liax-space:test}
    pull_policy: always
    depends_on:
      mysql:
        condition: service_healthy
    command: ["node", "apps/server/dist/jobs/runTranslationWorker.js"]
    environment:
      APP_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME:-liax_space}
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root}
      STORAGE_UPLOADS_DIR: /app/storage/uploads
      STORAGE_RENDERED_DIR: /app/storage/rendered
      STORAGE_RUNTIME_DIR: /app/storage/runtime
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      BACKGROUND_WORKER_MODE: external
      BACKGROUND_WORKER_ROLE: worker
      TRANSLATION_WORKER_POLL_INTERVAL_MS: ${TRANSLATION_WORKER_POLL_INTERVAL_MS:-2000}
    volumes:
      - uploads:/app/storage/uploads
      - rendered:/app/storage/rendered
      - runtime:/app/storage/runtime
      - backups:/app/storage/backups

  legacy-sync:
    image: ${APP_IMAGE:-rexyleria/liax-space:test}
    pull_policy: always
    profiles: ["legacy-sync"]
    depends_on:
      mysql:
        condition: service_healthy
    command: ["node", "apps/server/dist/jobs/runSyncLegacyPublicData.js"]
    environment:
      APP_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME:-liax_space}
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root}
      LEGACY_DATABASE_HOST: ${LEGACY_DATABASE_HOST:-liax-space-mysql}
      LEGACY_DATABASE_PORT: ${LEGACY_DATABASE_PORT:-3306}
      LEGACY_DATABASE_NAME: ${LEGACY_DATABASE_NAME:-liax_space}
      LEGACY_DATABASE_USER: ${LEGACY_DATABASE_USER:-root}
      LEGACY_DATABASE_PASSWORD: ${LEGACY_DATABASE_PASSWORD:-root}
      STORAGE_UPLOADS_DIR: /app/storage/uploads
      STORAGE_RENDERED_DIR: /app/storage/rendered
      STORAGE_RUNTIME_DIR: /app/storage/runtime
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    networks:
      - default
      - legacy
    volumes:
      - uploads:/app/storage/uploads
      - rendered:/app/storage/rendered
      - runtime:/app/storage/runtime
      - backups:/app/storage/backups

networks:
  legacy:
    external: true
    name: ${LEGACY_DOCKER_NETWORK:-liax_space_default}

volumes:
  mysql-data:
  uploads:
  rendered:
  runtime:
  backups:
